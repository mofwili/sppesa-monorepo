apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: odds-engine-api
  description: REST API for odds retrieval, market management and bet placement
  tags: [rest, betting, core]
spec:
  type: openapi
  lifecycle: production
  owner: group:default/betting-team
  system: betting-system
  definition: |
    openapi: 3.0.0
    info:
      title: Odds Engine API
      version: 1.0.0
    paths:
      /odds/{marketId}:
        get:
          summary: Get odds for a market
          parameters:
            - name: marketId
              in: path
              required: true
              schema:
                type: string
          responses:
            '200':
              description: Odds data
      /markets:
        get:
          summary: List all active markets
          responses:
            '200':
              description: List of markets
---
