app:
  title: SportPesa Developer Portal
  baseUrl: http://10.4.2.56:31007

organization:
  name: SportPesa

backend:
  baseUrl: http://10.4.2.56:31007
  listen:
    port: 7007
  reading:
    allow:
      - host: github.com
      - host: raw.githubusercontent.com
      - host: api.github.com
  csp:
    upgrade-insecure-requests: false
    connect-src: ["'self'", 'http:', 'https:']
  cors:
    origin: http://10.4.2.56:31007
    methods: [GET, POST, PUT, DELETE]
    credentials: true
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}

auth:
  environment: development
  providers:
    guest:
      dangerouslyAllowOutsideDevelopment: true

integrations:
  github:
    - host: github.com
      token: ${GITHUB_TOKEN}

catalog:
  orphanStrategy: delete
  rules:
    - allow: [Component, API, System, Domain, Resource, Location, Template, User, Group]
  locations:
    # SportPesa master catalog
    - type: url
      target: https://raw.githubusercontent.com/mofwili/sppesa-monorepo/main/backstage/catalog/all.yaml

    # Scaffolder templates
    - type: url
      target: https://raw.githubusercontent.com/mofwili/sppesa-monorepo/main/backstage/scaffolder-templates/microservice-template/template.yaml
      rules:
        - allow: [Template]

    # Default examples (can be removed in production)
    - type: file
      target: ./examples/org.yaml
      rules:
        - allow: [User, Group]

techdocs:
  builder: local
  generator:
    runIn: local
  publisher:
    type: local

kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - name: sportpesa-k8s
          url: https://10.4.2.56:6443
          authProvider: serviceAccount
          skipTLSVerify: true
          serviceAccountToken: ${K8S_SA_TOKEN}
          namespaces:
            - betting
            - casino
            - payments
            - platform
            - mobile
            - data
