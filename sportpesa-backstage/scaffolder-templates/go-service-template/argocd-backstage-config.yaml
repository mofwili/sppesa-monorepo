# Add this to your Backstage app-config.yaml to enable ArgoCD integration
# This shows ArgoCD sync status directly on each service page in Backstage

argocd:
  username: admin
  password: ${ARGOCD_PASSWORD}
  appLocatorMethods:
    - type: config
      instances:
        - name: sportpesa-argocd
          url: http://10.4.2.56:${ARGOCD_NODEPORT}
          token: ${ARGOCD_TOKEN}

