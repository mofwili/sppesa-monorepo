apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: sportpesa-go-service-template
  title: SportPesa Go Backend Service
  description: Creates a production-ready Go REST API with GitHub Actions CI, ArgoCD CD and Argo Rollouts canary deployment
  tags: [go, golang, gin, rest-api, argocd, gitops, canary, sportpesa]
  annotations:
    backstage.io/techdocs-ref: dir:.
spec:
  owner: group:default/platform-devops-team
  type: service

  parameters:
    - title: Service details
      required: [name, description, owner, domain]
      properties:
        name:
          title: Service name
          type: string
          description: Lowercase hyphenated name e.g. odds-feed-service
          pattern: ^[a-z][a-z0-9-]*$
          ui:autofocus: true
        description:
          title: Description
          type: string
          description: What does this service do?
        owner:
          title: Owning team
          type: string
          ui:field: OwnerPicker
          ui:options:
            allowedKinds: [Group]
        domain:
          title: Business domain
          type: string
          enum: [betting, casino, payments, platform]
          enumNames: [Betting, Casino, Payments, Platform]
        lifecycle:
          title: Lifecycle stage
          type: string
          enum: [experimental, development, production]
          default: development

    - title: Service configuration
      properties:
        port:
          title: HTTP port
          type: integer
          default: 8080
          description: Port the service will listen on
        namespace:
          title: Kubernetes namespace
          type: string
          enum: [betting, casino, payments, platform, mobile, data]
          default: platform
        replicas:
          title: Initial replicas
          type: integer
          default: 2
          minimum: 1
          maximum: 10
        canaryWeight:
          title: Canary initial traffic weight (%)
          type: integer
          default: 10
          minimum: 5
          maximum: 50
          description: Percentage of traffic to send to new version during canary rollout

    - title: Repository
      required: [repoName]
      properties:
        repoName:
          title: GitHub repo name
          type: string
          default: ${{ parameters.name }}
          description: Will be created under mofwili/sppesa-monorepo as services/${{ parameters.name }}

  steps:
    - id: fetch
      name: Fetch template skeleton
      action: fetch:template
      input:
        url: ./skeleton
        values:
          name: ${{ parameters.name }}
          description: ${{ parameters.description }}
          owner: ${{ parameters.owner }}
          domain: ${{ parameters.domain }}
          lifecycle: ${{ parameters.lifecycle }}
          port: ${{ parameters.port }}
          namespace: ${{ parameters.namespace }}
          replicas: ${{ parameters.replicas }}
          canaryWeight: ${{ parameters.canaryWeight }}
          repoName: ${{ parameters.repoName }}

    - id: publish
      name: Publish to GitHub
      action: publish:github
      input:
        description: ${{ parameters.description }}
        repoUrl: github.com?repo=${{ parameters.description }}&owner=mofwili
        defaultBranch: main
        #sourcePath: services/${{ parameters.name }}

    - id: register
      name: Register in Backstage catalog
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps.publish.output.repoContentsUrl }}
        #catalogInfoPath: /services/${{ parameters.name }}/catalog-info.yaml
        catalogInfoPath: /catalog-info.yaml

  output:
    links:
      - title: View repository
        url: ${{ steps.publish.output.remoteUrl }}
      - title: Open in catalog
        icon: catalog
        entityRef: ${{ steps.register.output.entityRef }}
      - title: View ArgoCD app
        url: http://argocd.sportpesa.com/applications/${{ parameters.name }}
        icon: web
